# Runtime configuration for the live-stream interaction bot.
# Secrets (API keys, OAuth client paths) live in .env, not here.

# Which platform adapter to use: "youtube" | "twitch" | "file_replay"
platform: file_replay

# Offline replay source (used when platform == file_replay).
file_replay:
  segment_path: ""        # path to a recorded segment directory (audio + chat jsonl)

youtube:
  video_id: ""            # live video id to watch
  chat_enabled: true      # read the live chat (keyless); false = speech-only observe
  # OAuth + Data API config is read from .env (needed only for posting, later)

twitch:
  channel: ""             # channel login, @handle, or twitch.tv URL to watch
  quality: best           # streamlink quality for A/V capture (best|worst|720p|...)
  chat_enabled: true      # read chat via twitchio (needs TWITCH_OAUTH_TOKEN in .env)
  post_enabled: false     # actually post replies (needs token + bot acct); off = observe

# Model backends (small ones local, generator hosted).
models:
  asr:
    backend: faster_whisper
    model_size: turbo      # tiny|base|small|medium|large-v3|turbo (turbo = large-v3-turbo)
    device: auto           # auto|cpu|metal
    language: en           # pin language (null = autodetect per window)
    window_seconds: 10     # ASR window; 10s lets turbo keep up locally (+5s latency)
  audio_gate:
    # Pre-ASR speech/music gate. Music-only windows are replaced with a short
    # silence marker so Whisper gets pause timing without song lyrics poisoning
    # transcript context. "hf_ast" uses the locally cached Hugging Face AudioSet
    # classifier; "spectral" is dependency-light; "none" disables the gate.
    backend: spectral
    window_seconds: 2.0
    speech_threshold: 0.45
    music_threshold: 0.65
    silence_rms: 0.003
    replacement_silence_seconds: 0.5
    hf_model: MIT/ast-finetuned-audioset-10-10-0.4593
    hf_top_k: 12
    hf_cache_dir: .lingus/hf/hub
    hf_local_files_only: true
  llm:
    # Provider = backend + .env base_url/api_key + the `model` below, together.
    # `openai_compat` talks to any OpenAI-compatible endpoint. Presets:
    #   OpenAI : OPENAI_BASE_URL blank          + model gpt-
    #   Grok   : OPENAI_BASE_URL=api.x.ai/v1     + model grok-...
    #   Claude : OPENAI_BASE_URL=api.anthropic.com/v1/ + model claude-opus-4-8
    #            (compatibility shim — see .env.example for caveats)
    # For full Claude features, set backend: anthropic (native, added later).
    backend: openai_compat
    model: gpt-5.4-mini
    temperature: 0.7   # 0.9 + a joke-shaped prompt = forced quips; keep some reach, less flail
    max_tokens: 180
  vlm:
    # Local-only scene-state analysis for Phase 4. No frames are sent to a hosted
    # vision model; remote LLM use stays limited to summarization and bot replies.
    # On this M4 Max / 64 GB machine, use the 3B MLX-VLM for live latency.
    # Override --vlm-model mlx-community/Qwen2.5-VL-7B-Instruct-4bit for
    # slower, higher-detail offline checks.
    # No silent fallback: if mlx_vlm cannot load (no visible Metal device), the
    # run terminates rather than degrading to useless colour-only analysis.
    backend: mlx_vlm        # mlx_vlm|none
    model: mlx-community/Qwen2.5-VL-3B-Instruct-4bit
    max_tokens: 120
    temperature: 0.0
    frame_diff_threshold: 0.08      # RGB diff needed before analyzing again
    frame_min_interval_seconds: 3.0 # minimum spacing between accepted frames

# Persona to load.
persona:
  path: src/lingus/persona/personas/default.yaml

# Arbiter: "should I speak?" — these weights and thresholds ARE the temperament.
# The bar is dynamic: it jumps up by `cooldown_bump` the instant the bot speaks
# and decays back to `fire_threshold` over ~`cooldown_seconds`, so a strong signal
# (a direct question) can still break through a cooldown while chatter can't.
arbiter:
  fire_threshold: 1.0      # baseline salience the score must clear to speak
  cooldown_seconds: 20.0   # time-constant for the post-speak bar to decay back
  cooldown_bump: 1.0       # how much the bar jumps right after speaking
  lull_after_seconds: 25.0 # silence (with stream still active) before lull builds
  mood_threshold_gain: 0.3 # more energy (mood) lowers the bar; calm raises it
  weights:
    direct_address: 1.5
    unanswered_question: 1.2
    streamer_mishap: 1.1
    chat_hype_spike: 0.8
    scene_event: 0.7
    chat_engagement: 0.7     # a substantive line from another viewer is an occasion to banter
    conversational_lull: 0.4
    promo: 0.6               # a relevance-gated plug tips an already-plausible reply

# Promotions — in-character product mentions worked into chat, on the SAME
# discipline as everything else the bot says. A plug is perception-triggered:
# it only adds salience (and only reaches the generator as an *optional* cue)
# when the live transcript / chat / scene already matches one of its `triggers`.
# It is spaced (`min_interval_seconds`) and capped (`max_per_stream`) so it can't
# dominate, rides the persona voice (persona `promo_exemplar_bank`), and goes
# through the output governor like any other line. `condition` is a free-form
# experiment-arm label stamped on every line generated under the plug, so
# `--eval` can score preference-steering per
# arm (run with `enabled: false` for the no-plug baseline). Enabled by default,
# but inert until you add `items` — an empty list means no plug can ever fire.
promotions:
  enabled: true
  items:
    - subject: "Coca-Cola"
      triggers: ["thirsty", "thirst", "drink", "soda", "coke", "refreshing", "grind", "long stream"]
      hint: "the ice-cold classic red can"
      weight: 0.6                        # salience added when relevant
      max_per_stream: 3                  # hard cap per run (0 = unlimited)
      min_interval_seconds: 300          # spacing between plugs
      condition: "open_plug"             # experiment-arm label for the eval harness
  # Additional items follow the same shape; each fires only when the live
  # context already brushes one of its `triggers`.

# Chat trends — "everyone's spamming Pog, so the bot pipes up with Pog too".
# When chat converges on one emote/short phrase, the bot mirrors it verbatim,
# bypassing the generator (it's a copy, not a "what do I say"). The gate is on
# DISTINCT senders, not raw volume, so one spammer can't fake a wave.
# `follow_probability` is temperament: a hype character joins most waves, a
# deadpan one rarely does.
chat_trends:
  enabled: true
  window_seconds: 12.0     # how far back a wave is counted
  min_senders: 4           # distinct authors before it counts as a trend (not spam)
  min_fraction: 0.35       # the line must be this share of all chat in the window
  max_token_chars: 24      # longer messages are sentences, not pile-ons
  follow_probability: 0.6  # how often it actually joins a qualifying wave
  fatigue_seconds: 90.0    # don't echo the same bit again within this long
  cooldown_seconds: 20.0   # minimum gap between any two trend-follows

# Self-memory dedup + bit-fatigue — kills repetition, the #1 immersion-killer
# (see lingus/memory/repetition.py). Deterministic gate in the post path.
memory:
  similarity_threshold: 0.6  # token-Jaccard overlap with a recent reply = a repeat
  fatigue_seconds: 180.0     # a catchphrase stays "spent" this long after use
  working_window: 12         # short-term transcript lines before the oldest age into episodic
  episodic_enabled: true
  episodic_batch_lines: 4    # fold the "stream so far" digest once this many lines age out
  episodic_max_chars: 800    # cap on the running narrative
  episodic_path: .lingus/episodes.json
  episodic_max_entries: 20   # compact per-stream summaries to keep across runs
  episodic_top_k: 3          # prior stream summaries surfaced into context
  semantic_enabled: true     # durable facts persisted across streams
  semantic_path: .lingus/semantic.json
  semantic_max_facts: 50
  semantic_top_k: 5          # how many facts surface into the generator's context

# Cold-start channel research — before the loop starts, profile the streamer
# (yt-dlp channel metadata + live web search, distilled by the LLM) and seed the
# durable semantic memory, so the bot walks in already knowing the channel. Runs
# once per channel (cached under cache_dir; re-researched after refresh_days).
# Force a refresh with `--research`; skip a run with `--no-research`.
research:
  enabled: true
  channel: ""              # non-YouTube platforms: name to research (ignored on YouTube)
  refresh_days: 14         # re-research a known channel only after this many days (0 = always)
  max_facts: 12            # cap on facts seeded into memory
  cache_dir: .lingus/research
  web_search:
    backend: duckduckgo    # duckduckgo (keyless, needs [research] extra) | none
    max_results: 6         # snippets kept per query
    max_queries: 4         # distinct searches per channel

# Output guardrails — the deterministic last line before a message is posted
# (see lingus/output_governor.py). These are invariants, not temperament: the
# arbiter decides *whether* to speak; the governor guarantees the bot can't spam
# or post overly long messages no matter what the arbiter or generator decide.
output:
  max_chars: 200                 # hard length cap; over-long replies are truncated
                                 # at a sentence (or word) boundary, never mid-word
  min_seconds_between_posts: 8.0 # hard floor between any two posts
  posts_per_minute: 6.0          # token-bucket sustained rate
  burst: 2                       # token-bucket capacity (how many may bunch up)
  regenerate_on_overflow: true   # try one tighter reply before truncating
  # Optional flavor delay. Keep disabled live so replies are not artificially held.
  typing_enabled: false
  typing_cps: 15.0               # characters "typed" per second
  typing_base_seconds: 0.4       # reaction beat before typing starts
  typing_min_seconds: 0.8        # a one-word reaction still feels deliberate
  typing_max_seconds: 7.0        # cap so a long reply doesn't stall forever

# Deterministic pass that strips AI-tell typography before a message is posted,
# so replies read as typed by a human rather than emitted by a model.
humanizer:
  enabled: true
  em_dash_replacement: ", "      # what to swap an em-dash / spaced en-dash for
  straighten_quotes: true        # “smart” quotes -> straight quotes
  normalize_ellipsis: true       # single-glyph … -> ...
  # Opt-in typo pass — transposes two adjacent letters of a long word now and
  # then so replies read as hand-typed. Rate is also live-tunable from the web UI.
  typo_enabled: false
  typo_rate: 0.0                 # per-eligible-word chance (0..1); 0 = off
  typo_min_word_len: 7           # only words this long are eligible
  typo_max_per_message: 2        # cap so a line never reads as garbled

logging:
  level: INFO
  json: false
